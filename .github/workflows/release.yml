name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-libre-apk:
    name: Build Libre APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Libre Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleLibreRelease

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/libre/release -name '*.apk' | head -1)
          cp "$APK" keepassdx-libre-release.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keepassdx-libre-release-apk
          path: keepassdx-libre-release.apk

  release:
    name: Create GitHub Release
    needs: [build-libre-apk]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mv artifacts/keepassdx-libre-release-apk/keepassdx-libre-release.apk .
          sha256sum keepassdx-libre-release.apk > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            keepassdx-libre-release.apk
            SHA256SUMS.txt
          body: |
            ## KeePassDX with Per-Device KeeShare Sync

            > **Note:** This APK is built from a fork with per-device KeeShare sync patches. It is not an official KeePassDX release. Use at your own risk.

            ### Installation
            Download `keepassdx-libre-release.apk` and install on your Android device.
            You may need to enable "Install from unknown sources" for your browser.

            ### SHA256 Checksums
            See `SHA256SUMS.txt` for verification.
